<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="人生の走馬灯のような背景">
  <defs>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="paperGrain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="3" seed="32"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.09"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <filter id="memoryShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1b100c" flood-opacity="0.34"/>
    </filter>
    <linearGradient id="dawn" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7dca3"/>
      <stop offset="0.45" stop-color="#c98b65"/>
      <stop offset="1" stop-color="#26313f"/>
    </linearGradient>
    <linearGradient id="film" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#1f1716" stop-opacity="0.82"/>
      <stop offset="0.5" stop-color="#6a4330" stop-opacity="0.58"/>
      <stop offset="1" stop-color="#14191f" stop-opacity="0.88"/>
    </linearGradient>
    <radialGradient id="memoryGlow" cx="42%" cy="40%" r="62%">
      <stop offset="0" stop-color="#fff1bd" stop-opacity="0.88"/>
      <stop offset="0.42" stop-color="#e8a866" stop-opacity="0.36"/>
      <stop offset="1" stop-color="#130b10" stop-opacity="0"/>
